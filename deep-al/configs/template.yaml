# Folder name where best model logs etc are saved. "auto" creates a timestamp based folder
EXP_NAME: 'SOME_RANDOM_NAME'
# Note that non-determinism may still be present due to non-deterministic
# operator implementations in GPU operator libraries
RNG_SEED: 1
# GPU ID you want to execute the process on
GPU_ID: '3'
DATASET:
  NAME: CIFAR10 # or CIFAR100, MNIST, SVHN, TinyImageNet
  ROOT_DIR: 'data' # Relative path where data should be downloaded
  # Specifies the proportion of data in train set that should be considered as the validation data
  VAL_RATIO: 0.1
  # Data augmentation methods - 'simclr', 'randaug', 'horizontalflip'
  AUG_METHOD: 'horizontalflip' 
MODEL:
  # Model type. 
  # Choose from vgg style ['vgg11', 'vgg11_bn', 'vgg13', 'vgg13_bn', 'vgg16', 'vgg16_bn', 'vgg19_bn', 'vgg19',]
  # or from resnet style ['resnet18', 'resnet34', 'resnet50', 'resnet101', 'resnet152', 'resnext50_32x4d', 'resnext101_32x8d', 
  # 'wide_resnet50_2', 'wide_resnet101_2']
  TYPE: resnet18
  NUM_CLASSES: 10
OPTIM:
  TYPE: 'sgd' # or 'adam'
  BASE_LR: 0.1
  # Learning rate policy select from {'cos', 'exp', 'steps'}
  LR_POLICY: steps
  # Steps for 'steps' policy (in epochs)
  STEPS: [0] #[0, 30, 60, 90]
  # Training Epochs
  MAX_EPOCH: 1
  # Momentum
  MOMENTUM: 0.9
  # Nesterov Momentum
  NESTEROV: False
  # L2 regularization
  WEIGHT_DECAY: 0.0005
  # Exponential decay factor
  GAMMA: 0.1
TRAIN:
  SPLIT: train
  # Training mini-batch size
  BATCH_SIZE: 256
  # Image size
  IM_SIZE: 32
  IM_CHANNELS = 3
  # Evaluate model on test data every eval period epochs
  EVAL_PERIOD: 1
TEST:
  SPLIT: test
  # Testing mini-batch size
  BATCH_SIZE: 200
  # Image size
  IM_SIZE: 32
  # Saved model to use for testing (useful when running tools/test_model.py)
  MODEL_PATH: ''
DATA_LOADER:
  NUM_WORKERS: 4
CUDNN:
  BENCHMARK: True
ACTIVE_LEARNING:
  # Active sampling budget (at each episode)
  BUDGET_SIZE: 5000
  # Active sampling method
  SAMPLING_FN: 'dbal' # 'random', 'uncertainty', 'entropy', 'margin', 'bald', 'vaal', 'coreset', 'ensemble_var_R', 'probcover', 'id_prob_cover', 'knn_distance_cover', 'density_cover', 'distance_variance_cover', 'distance_cv_cover', 'geometry_auto_research'
  # Initial labeled pool ratio (% of total train set that should be labeled before AL begins)
  INIT_L_RATIO: 0.1
  # Max AL episodes
  MAX_ITER: 1
  DROPOUT_ITERATIONS: 10 # Used by DBAL
  GEOAR_ALPHA: 1.0
  GEOAR_BETA: 1.0
  GEOAR_GAMMA: 0.0
  GEOAR_K_ID: 10
  GEOAR_K_KNN: 20
  GEOAR_MODE: 'zero' # 'high_id_more_weight', 'low_id_more_weight', 'zero'
  GEOAR_RADIUS: 0.0
  GEOAR_GRAPH_MODE: 'knn' # 'knn', 'radius', 'component', 'hybrid'
  GEOAR_RECOMPUTE_GREEDY: True
  GEOAR_LOG_CSV: 'geometry_auto_research_rounds.csv'
  GEOAR_UNCERTAINTY: 'entropy' # 'entropy', 'margin', 'least_confidence'
  IDPC_K_ID: 50
  IDPC_K_KNN: 50
  IDPC_ALPHA: 1.0
  IDPC_MODE: 'high_id_more_centers'
  IDPC_EPS: 1e-8
  IDPC_LOG_CSV: 'id_probcover_rounds.csv'
  IDPC_CACHE_ROOT: ''
  IDPC_L2_NORMALIZE_FEATURES: True
  IDPC_PREFER_FAISS: True
  IDPC_FAISS_GPU: True
  IDPC_ADD_SELF_COVER: True
  ARC_K_SIGNAL: 50
  ARC_K_KNN: 50
  ARC_ALPHA: 1.0
  ARC_EPS: 1e-8
  ARC_CACHE_ROOT: ''
  ARC_L2_NORMALIZE_FEATURES: True
  ARC_PREFER_FAISS: True
  ARC_FAISS_GPU: True
  ARC_ADD_SELF_COVER: True
# Useful when running `tools/ensemble_al.py` or `tools/ensemble_train.py`
ENSEMBLE: 
  NUM_MODELS: 3
  MODEL_TYPE: ['resnet18']
